# validate.yml — the required status check on `dev` and `main`.
# Runs `scripts/validate.sh` on PRs targeting either long-lived branch and on
# pushes to them (ADR-0036: dev integrates, main is the stable channel).
# Required by branch protection (see `agent/AGENTS.md` § Boundaries); admins
# cannot bypass per `enforce_admins: true` (closed PR #50; RCA in issue #52).

name: validate

# Least-privilege default token: the validator only reads the checkout
# (resolves CodeQL actions/missing-workflow-permissions; ADR-0052).
permissions:
  contents: read

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run repo validator
        run: ./scripts/validate.sh
