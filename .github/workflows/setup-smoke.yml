---
# setup-smoke: fresh-OS validation of setup.sh on Ubuntu + macOS GHA runners.
#
# Rationale: the active dev host is a configured machine; the install-trust
# claims in ADR-0009/0010/0011 ("fresh box, git clone, ./setup.sh works")
# cannot be verified there. This workflow exercises the full install path
# on stock GitHub-hosted runners.
#
# Not a required status check — would unnecessarily block PRs that don't
# touch the install surface. Triggered narrowly via `paths:` on the relevant
# directories, plus a weekly cron to catch upstream-image drift independent
# of PR cadence.
#
# Refs: #102 (parent), #110 (toolchain phase), #111 (this workflow).
name: setup-smoke

on:
  pull_request:
    paths:
      - setup.sh
      - scripts/lib/**
      - scripts/validate-*-vendor.sh
      - agent/vendor/**
      - .github/workflows/setup-smoke.yml
  schedule:
    # Weekly Monday 12:00 UTC (≈ 08:00 US Eastern). One-week max latency
    # for upstream-image drift detection on a tool we ship.
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel superseded PR runs (cheap-and-fast iteration); never cancel
  # scheduled or workflow_dispatch runs partway through.
  group: setup-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      # Exercise the vendored pi runtime path explicitly. As of ADR-0012
      # this is now the default (PI_USE_VENDORED unset => vendored path),
      # so the explicit '1' is redundant. Kept for self-documenting
      # workflow YAML and as defense against silent future re-flips.
      # The 'smoke-npm-optout' job below covers the PI_USE_VENDORED=0 path.
      PI_USE_VENDORED: '1'
      # Open the Linux sudo gates so jq + yamllint distro installs run.
      # macOS uses brew (never sudo); these env vars are harmless there.
      PI_ALLOW_SUDO_APT: '1'
      PI_ALLOW_SUDO_DNF: '1'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: ensure ~/.local/bin on PATH
        # setup.sh §1b symlinks vendored gh/yq/shellcheck into ~/.local/bin
        # and WARNs if it is not on PATH. Inject it into $GITHUB_PATH so
        # subsequent steps can resolve the installed tools.
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: dry-run preview
        run: |
          ./setup.sh --dry-run 2>&1 | tee dry-run.log
          # Sanity-grep representative phase markers; if the dry-run output
          # ever changes shape these grep -q assertions surface it.
          grep -q 'dry-run' dry-run.log
          grep -q '\[toolchain\]' dry-run.log
          # Summary line per agent/rules/script-output-conventions.md.
          grep -qE '^(PASS|FAIL) — [0-9]+ errors, [0-9]+ warnings$' dry-run.log

      - name: install (real)
        run: ./setup.sh

      - name: inject nvm-managed node bin into PATH for subsequent steps
        # `nvm use` does not persist across GHA steps (each step is a fresh
        # shell). Source nvm here once, resolve the active node bin dir, and
        # write it to $GITHUB_PATH so every subsequent step has node + npm +
        # npm-globals (markdownlint-cli2 lives in the same bin dir as node
        # when installed via nvm-managed npm) on PATH without needing to
        # re-source nvm or use a login shell.
        run: |
          # shellcheck disable=SC1091
          . "$HOME/.nvm/nvm.sh"
          nvm use 24 >/dev/null
          node_bin=$(dirname "$(command -v node)")
          echo "PATH-injected: $node_bin"
          echo "$node_bin" >> "$GITHUB_PATH"

      - name: assert node 24.x via nvm
        run: |
          node --version | grep -E '^v24\.'
          command -v node | grep -F "$HOME/.nvm/versions/node"

      - name: assert toolchain present
        run: |
          missing=0
          for t in gh yq shellcheck jq yamllint markdownlint-cli2; do
            if command -v "$t" >/dev/null 2>&1; then
              printf 'OK    %s -> %s\n' "$t" "$(command -v "$t")"
            else
              printf 'MISS  %s\n' "$t"
              missing=$((missing + 1))
            fi
          done
          # yq must be the mikefarah variant; the kislyuk Python tool has
          # different syntax and would silently break downstream skill
          # content (see ADR-0011 § 'Why mikefarah/yq specifically').
          if ! yq --version 2>&1 | grep -q mikefarah; then
            echo "ERROR: yq is not the mikefarah variant"
            yq --version
            missing=$((missing + 1))
          fi
          [ "$missing" -eq 0 ]

      - name: assert pi runtime present
        run: |
          command -v pi
          pi --version

      - name: run repo validators against the installed toolchain
        # End-to-end confirmation that shellcheck + markdownlint-cli2 +
        # yamllint (transitively, via the linter rule paths) all actually
        # work after install, not just exist on PATH.
        run: ./scripts/validate.sh

  smoke-npm-optout:
    # ADR-0012 keeps the npm path supported indefinitely as the
    # PI_USE_VENDORED=0 opt-out. This job exercises the opt-out so it
    # doesn't bit-rot. Ubuntu-only to keep cron cost down; the opt-out
    # logic is platform-independent (it's just `npm install -g`).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PI_USE_VENDORED: '0'
      PI_ALLOW_SUDO_APT: '1'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: ensure ~/.local/bin on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: dry-run preview (npm opt-out)
        run: |
          ./setup.sh --dry-run 2>&1 | tee dry-run.log
          grep -q 'dry-run' dry-run.log
          # Two greps: PI_USE_VENDORED=0 env-echo + the unique npm-branch
          # entry phrase. Both must match so the canary doesn't pass if a
          # future refactor moves the env-var substring elsewhere (e.g.
          # into a warn message) while silently taking the vendored branch.
          grep -q 'PI_USE_VENDORED=0' dry-run.log
          grep -q 'legacy npm install path' dry-run.log
          grep -qE '^(PASS|FAIL) — [0-9]+ errors, [0-9]+ warnings$' dry-run.log

      - name: install (real, npm opt-out)
        run: ./setup.sh

      - name: inject nvm-managed node bin into PATH for subsequent steps
        run: |
          # shellcheck disable=SC1091
          . "$HOME/.nvm/nvm.sh"
          nvm use 24 >/dev/null
          node_bin=$(dirname "$(command -v node)")
          echo "$node_bin" >> "$GITHUB_PATH"

      - name: assert pi runtime present (npm-installed)
        run: |
          command -v pi
          pi --version
